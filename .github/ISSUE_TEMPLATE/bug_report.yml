name: Bug report
description: Report a reproducible bug in scripts or documentation
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. Please provide a minimal and reproducible case.
  - type: input
    id: script
    attributes:
      label: Affected script/file
      placeholder: scripts/Start-StripeListener.ps1
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      placeholder: |
        1. Configure app ...
        2. Run ...
        3. See error ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: Windows Server 2025, PowerShell 7.4, Stripe CLI x.y.z
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: Safety checks
      options:
        - label: I removed secrets/keys from logs and screenshots
          required: true
